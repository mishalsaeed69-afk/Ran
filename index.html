<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شراريب ران</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#fff;color:#111}

/* navbar */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
border-bottom:1px solid #eee;
}
.logo{font-size:28px;font-weight:800}

/* hero */
.hero{text-align:center;padding:70px 20px}
.hero h1{font-size:46px;margin-bottom:10px}
.hero p{color:#666;margin-bottom:20px}
.btn{
background:#111;color:#fff;padding:12px 28px;
border-radius:6px;text-decoration:none;display:inline-block
}

/* products */
.products{padding:50px 8%}
.section-title{text-align:center;font-size:28px;margin-bottom:30px}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.product-card{
border:1px solid #eee;
border-radius:12px;
padding:15px;
background:#fff;
transition:.25s;
}
.product-card:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.product-img{
width:100%;
height:220px;
border-radius:8px;
overflow:hidden;
margin-bottom:12px;
background:#f3f3f3;
}
.product-img img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.product-title{font-weight:600;margin-bottom:6px}
.price{font-weight:700;color:#111}

/* footer */
.footer{
margin-top:60px;
padding:25px;
text-align:center;
border-top:1px solid #eee;
color:#666;
}

/* mobile */
@media (max-width:600px){
.hero h1{font-size:34px}
}
</style>
</head>

<body>

<!-- navbar -->
<div class="navbar">
  <div class="logo">RUN</div>
</div>

<!-- hero -->
<section class="hero">
  <h1>شراريب RUN</h1>
  <p>راحة يومك تبدأ من قدمك</p>
  <a href="#" class="btn">تسوق الآن</a>
</section>

<!-- products -->
<section class="products">
  <h2 class="section-title">المنتجات</h2>

  <div class="products-grid">

    <!-- الأبيض -->
    <div class="product-card">
  <div class="product-img">
    <img src="8a097f9d-23df-48b9-bcb2-d8cebbeb7c0c.jpeg">
  </div>
  <div class="product-title">جورب أبيض</div>
  <div class="price">9.99 ر.س</div>
  <button class="buy-btn">شراء الآن</button>
</div>

    <!-- الأسود -->
    <div class="product-card">
      <div class="product-img">
        <img src="f5fcaa5b-16c2-4a82-80fc-7270cc8faddc.jpeg">
      </div>
      <div class="product-title">جورب اسود</div>
      <div class="price">9.99 ر.س</div>
    </div><button class="buy-btn">شراء الآن</button>

  </div>
</section>

<!-- footer -->
<div class="footer">
© 2026 RUN - جميع الحقوق محفوظة
</div>

</body>
</html>
